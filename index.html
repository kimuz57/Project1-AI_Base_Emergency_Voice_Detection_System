<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Patient Monitor Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #121212; color: white; padding: 20px; transition: background-color 0.3s; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        h1 { margin-top: 0; color: #4CAF50; }
        .status-box { margin: 20px 0; padding: 20px; border-radius: 10px; background: #2d2d2d; border: 2px solid #3d3d3d; }
        #statusText { font-size: 28px; font-weight: bold; }
        .confidence { font-size: 18px; color: #aaa; margin-top: 10px; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; background: #000; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        
        button { padding: 15px 40px; font-size: 18px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        #startBtn { background-color: #4CAF50; color: white; }
        #stopBtn { background-color: #f44336; color: white; display: none; }
        #loopbackBtn { background-color: #2196F3; color: white; font-size: 14px; padding: 10px 20px; }
        
        select { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; margin-bottom: 15px; width: 100%; max-width: 400px; }
        
        .debug-panel { margin-top: 20px; padding: 10px; font-size: 12px; color: #666; text-align: left; background: #000; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🩺 Smart Ward: AI Audio Monitor</h1>
        
        <div id="setupArea" style="margin-bottom: 20px;">
            <select id="micSelect"><option value="">เลือกไมโครโฟน...</option></select><br>
            <button id="loopbackBtn">🔊 ทดสอบเสียงออกลำโพง (OFF)</button>
            <p style="font-size: 11px; color: #888;">*ถ้ากด ON แล้วพูดใส่ไมค์ คุณต้องได้ยินเสียงตัวเองออกลำโพงครับ*</p>
        </div>

        <button id="startBtn">▶ เริ่มมอนิเตอร์</button>
        <button id="stopBtn">⏹ หยุดระบบ</button>

        <div class="status-box">
            <div id="statusText">ระบบสแตนด์บาย...</div>
            <div class="confidence" id="confidenceText">พร้อมรับสัญญาณเสียง</div>
            
            <div style="margin-top: 15px; height: 35px; background: #000; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #444;">
                <div id="volumeBar" style="height: 100%; width: 0%; background: #4CAF50;"></div>
                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: bold;">
                    SIGNAL: <span id="dbLevel">0%</span>
                </div>
            </div>
        </div>

        <div class="chart-container"><canvas id="confidenceChart"></canvas></div>
        
        <div class="debug-panel" id="debugLog">Logs: ระบบพร้อมทำงาน</div>
    </div>

    <script>
        const micSelect = document.getElementById('micSelect');
        const debugLog = document.getElementById('debugLog');
        const loopbackBtn = document.getElementById('loopbackBtn');
        let isLoopback = false;

        function log(msg) {
            debugLog.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            console.log(msg);
        }

        async function getDevices() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(d => d.kind === 'audioinput');
                micSelect.innerHTML = audioInputs.map(d => `<option value="${d.deviceId}">${d.label || 'Mic'}</option>`).join('');
                stream.getTracks().forEach(t => t.stop());
                log("พบไมโครโฟน " + audioInputs.length + " ตัว");
            } catch (err) {
                log("Error: ไม่สามารถเข้าถึงไมค์ได้ - " + err.message);
            }
        }
        getDevices();

        const chartCtx = document.getElementById('confidenceChart').getContext('2d');
        const chart = new Chart(chartCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'AI Confidence (%)', data: [], borderColor: '#4CAF50', fill: true }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });

        let stream, rtcRecorder, isRecording = false, audioContext, analyser, dataArray, animationId, sourceNode;

        loopbackBtn.onclick = () => {
            isLoopback = !isLoopback;
            loopbackBtn.innerText = `🔊 ทดสอบเสียงออกลำโพง (${isLoopback ? 'ON' : 'OFF'})`;
            loopbackBtn.style.backgroundColor = isLoopback ? '#4CAF50' : '#2196F3';
            if (isRecording && audioContext) {
                if (isLoopback) sourceNode.connect(audioContext.destination);
                else sourceNode.disconnect(audioContext.destination);
            }
        };

        async function startMonitoring() {
            try {
                const constraints = { 
                    audio: { 
                        deviceId: micSelect.value ? { exact: micSelect.value } : undefined,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                log("กำลังใช้ไมค์: " + stream.getAudioTracks()[0].label);
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                sourceNode = audioContext.createMediaStreamSource(stream);
                sourceNode.connect(analyser);

                if (isLoopback) sourceNode.connect(audioContext.destination);

                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isRecording = true;
                updateVolume();

                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-block';
                document.getElementById('statusText').innerText = '🟢 กำลังฟังเสียง...';

                recordLoop();
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        function updateVolume() {
            if (!isRecording) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let vol = Math.min((sum / dataArray.length) * 3, 100);
            document.getElementById('volumeBar').style.width = vol + "%";
            document.getElementById('dbLevel').innerText = Math.round(vol) + "%";
            animationId = requestAnimationFrame(updateVolume);
        }

        function recordLoop() {
            if (!isRecording) return;
            rtcRecorder = RecordRTC(stream, { type: 'audio', mimeType: 'audio/wav', recorderType: StereoAudioRecorder, desiredSampRate: 16000, numberOfAudioChannels: 1 });
            rtcRecorder.startRecording();
            setTimeout(() => {
                if (!isRecording) return;
                rtcRecorder.stopRecording(() => { sendToBackend(rtcRecorder.getBlob()); recordLoop(); });
            }, 5000);
        }

        async function sendToBackend(blob) {
            const fd = new FormData(); fd.append('audio', blob, 'audio.wav');
            try {
                const res = await fetch('http://localhost:3001/events/upload-audio', { method: 'POST', body: fd });
                const json = await res.json();
                const conf = (json.confidence || 0) * 100;
                document.getElementById('confidenceText').innerText = `AI: ${conf.toFixed(2)}% (${json.transcribed_text || 'ไม่ได้ยินเสียง'})`;
                
                chart.data.labels.push(new Date().toLocaleTimeString());
                chart.data.datasets[0].data.push(conf);
                if (chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update();

                if (json.status === "emergency") {
                    document.body.style.backgroundColor = "#4a0000";
                    document.getElementById('statusText').innerText = "🚨 ตรวจพบ: " + json.keyword;
                } else {
                    document.body.style.backgroundColor = "#121212";
                    document.getElementById('statusText').innerText = "🟢 ปกติ";
                }
            } catch (e) { log("Error: ติดต่อ Server ไม่ได้"); }
        }

        document.getElementById('startBtn').onclick = startMonitoring;
        document.getElementById('stopBtn').onclick = () => {
            isRecording = false;
            cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
        };
    </script>
</body>
</html>
